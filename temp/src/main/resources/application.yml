server:
  port: 8081

spring:
  application:
    name: temp
  freemarker:
    cache: false
  profiles:
    active: local

---
# Elasticsearch
spring:
  elasticsearch:
    uris: http://localhost:9200
  data:
    elasticsearch:
      repositories:
        enabled: true

---
# Messages
spring:
  messages:
    basename: messages/messages
    encoding: UTF-8

---
# Etc
spring:
  output:
    ansi:
      enabled: always   # console 모드별 색상 변환