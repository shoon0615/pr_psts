spring:
  config:
    activate:
      on-profile: prod

---
# DB(Database)
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DATABASE_URL}/${DATABASE_DB}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

---
# JPA
spring:
  jpa:
    hibernate:
      ddl-auto: validate
  open-in-view: false
  properties:
    hibernate:
      format_sql: false
  sql:
    init:
      mode: always

---
# Etc
logging:
  level:
    root: WARN